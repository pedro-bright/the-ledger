name: Check Stale Sources

on:
  schedule:
    # Every Sunday at 06:00 UTC
    - cron: "0 6 * * 0"
  workflow_dispatch: # Allow manual trigger

jobs:
  check-links:
    name: Check Source Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check links
        id: check
        continue-on-error: true
        run: npm run check-links

      - name: Create issue if broken links found
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'broken-links-report.md';
            let body = '## Broken Links Detected\n\nThe weekly link checker found broken source URLs. Please review and update.\n\nRun `npm run check-links` locally for details.';

            if (fs.existsSync(reportPath)) {
              body = fs.readFileSync(reportPath, 'utf-8');
            }

            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'broken-links',
              per_page: 1,
            });

            if (issues.data.length > 0) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `### Updated: ${new Date().toISOString().slice(0, 10)}\n\n${body}`,
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔗 Broken source links detected — ${new Date().toISOString().slice(0, 10)}`,
                body,
                labels: ['broken-links', 'maintenance'],
              });
            }
