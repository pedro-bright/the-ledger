name: Deploy Site

on:
  push:
    branches: [main]

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Generate feeds
        run: |
          npm run generate-feed
          cp feed.xml rss.xml site/public/ 2>/dev/null || true

      - name: Install site dependencies
        working-directory: site
        run: npm ci || npm install

      - name: Build site
        working-directory: site
        run: npm run build || echo "Site build not yet configured — placeholder deploy"

      # Placeholder: replace with actual deployment (Vercel, Netlify, GitHub Pages)
      - name: Deploy placeholder
        run: |
          echo "🚀 Site build complete. Deploy target not yet configured."
          echo "Configure Vercel/Netlify/GitHub Pages deployment here."
