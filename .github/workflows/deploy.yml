name: Deploy Site

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Build & Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build graph
        run: |
          npm run build-graph
          mkdir -p site/public
          cp graph.json site/public/

      - name: Generate feeds
        run: |
          npm run generate-feed
          mkdir -p site/public
          cp feed.xml rss.xml site/public/ 2>/dev/null || true

      - name: Install site dependencies
        working-directory: site
        run: npm install

      - name: Build site
        working-directory: site
        env:
          PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.PUBLIC_POSTHOG_PROJECT_TOKEN }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        working-directory: site
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} dist/
